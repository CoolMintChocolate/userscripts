name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  deploy:
    name: Deploy to GitHub Pages
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              (cd "$pkg" && pnpm build)
            fi
          done

      - name: Collect build artifacts and generate index
        run: |
          mkdir -p _site
          links=""
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            if [ -d "$pkg/dist" ]; then
              mkdir -p "_site/$name"
              cp "$pkg"/dist/*.user.js "_site/$name/"
              for f in "$pkg"/dist/*.user.js; do
                filename=$(basename "$f")
                links="$links<li><a href=\"$name/$filename\">$name/$filename</a></li>\n"
              done
            fi
          done
          cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Userscripts</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
              a { color: #0969da; }
            </style>
          </head>
          <body>
            <h1>Userscripts</h1>
            <ul>
            $(echo -e "$links")
            </ul>
            <p><a href="https://github.com/coolmintchocolate/userscripts">View source on GitHub</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
